<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办事项</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Header -->
  <header class="bg-blue-600 text-white shadow-md">
    <div class="max-w-xl mx-auto px-4 py-5 flex items-center justify-between">
      <h1 class="text-2xl font-bold tracking-wide">待办事项</h1>
      <div class="text-sm text-blue-100">
        未完成 <span id="activeCount" class="font-bold text-white">0</span> /
        共 <span id="totalCount" class="font-bold text-white">0</span> 项
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-xl mx-auto px-4 py-6">

    <!-- 输入区 -->
    <div class="flex gap-2 mb-6">
      <input
        id="todoInput"
        type="text"
        maxlength="100"
        placeholder="输入待办事项，按回车添加..."
        class="flex-1 px-4 py-2 rounded-lg border border-gray-300 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition"
      >
      <button
        onclick="addTodo()"
        class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition"
      >
        添加
      </button>
    </div>

    <!-- 筛选 Tab -->
    <div class="flex gap-2 mb-4">
      <button data-filter="all"      onclick="setFilter('all', this)"      class="filter-btn active flex-1 py-1.5 text-sm rounded-lg border transition">全部</button>
      <button data-filter="active"   onclick="setFilter('active', this)"   class="filter-btn flex-1 py-1.5 text-sm rounded-lg border transition">未完成</button>
      <button data-filter="done"     onclick="setFilter('done', this)"     class="filter-btn flex-1 py-1.5 text-sm rounded-lg border transition">已完成</button>
    </div>

    <!-- 待办列表 -->
    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
      <ul id="todoList"></ul>
      <div id="emptyState" class="hidden py-12 text-center text-gray-400 text-sm">暂无待办事项</div>
    </div>

    <!-- 底部操作 -->
    <div class="mt-4 text-right">
      <button
        onclick="clearDone()"
        class="text-sm text-red-400 hover:text-red-600 transition"
      >
        清除已完成
      </button>
    </div>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
